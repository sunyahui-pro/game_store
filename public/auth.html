<!DOCTYPE html>
<html lang="zh-CN" data-color="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - 游戏中心</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🎮 游戏中心</h1>
        <p>登录以开始游戏之旅</p>
      </div>
      
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">登录</button>
        <button class="auth-tab" onclick="switchTab('register')">注册</button>
      </div>
      
      <!-- 登录表单 -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg auth-submit">登录</button>
      </form>
      
      <!-- 注册表单 -->
      <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" name="nickname" placeholder="请输入昵称（可选）">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg auth-submit">注册</button>
      </form>
      
      <div class="auth-footer">
        <a href="/">← 返回首页</a>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabs = document.querySelectorAll('.auth-tab');
      
      tabs.forEach(t => t.classList.remove('active'));
      
      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabs[0].classList.add('active');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabs[1].classList.add('active');
      }
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const form = e.target;
      const username = form.username.value;
      const password = form.password.value;
      
      const success = await login(username, password);
      if (success) {
        location.href = '/games.html';
      }
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const username = form.username.value;
      const password = form.password.value;
      const nickname = form.nickname.value;
      
      const success = await register(username, password, nickname);
      if (success) {
        location.href = '/games.html';
      }
    }
  </script>
</body>
</html>
