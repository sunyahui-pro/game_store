<!DOCTYPE html>
<html lang="zh-CN" data-color="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打砖块 - 游戏中心</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .game-canvas-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--space-4);
    }
    
    .canvas-wrapper {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    
    canvas {
      display: block;
      background: #1a1a2e;
      border-radius: var(--radius);
    }
    
    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .game-over-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .game-over-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: var(--space-4);
    }
    
    .game-info {
      display: flex;
      justify-content: center;
      gap: var(--space-6);
      margin-bottom: var(--space-4);
    }
    
    .info-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      text-align: center;
      min-width: 100px;
    }
    
    .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">游戏中心</span>
      </a>
      <nav class="nav-desktop" id="navLinksDesktop"></nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <nav id="navLinksMobile"></nav>
  </div>

  <main class="main">
    <div class="game-container">
      <div class="game-header">
        <h1 class="game-title"><span>🧱</span><span>打砖块</span></h1>
        <div class="game-controls">
          <button class="btn btn-secondary" onclick="resetGame()">🔄 新游戏</button>
          <a href="/games.html" class="btn btn-secondary">← 返回</a>
        </div>
      </div>
      
      <div class="game-info">
        <div class="info-box">
          <div class="info-label">得分</div>
          <div class="info-value" id="score">0</div>
        </div>
        <div class="info-box">
          <div class="info-label">生命</div>
          <div class="info-value" id="lives">3</div>
        </div>
      </div>
      
      <div class="game-canvas-container">
        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="480" height="400" tabindex="0" style="outline: none; cursor: pointer;"></canvas>
          <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">游戏结束!</div>
            <div style="color: white; margin-bottom: 1rem;">最终得分: <span id="finalScore">0</span></div>
            <button class="btn btn-primary" onclick="resetGame()">再试一次</button>
          </div>
        </div>
      </div>
      
      <div class="game-instructions">
        <h3>🎮 游戏说明</h3>
        <ul>
          <li>使用方向键 ←→ 或鼠标移动挡板</li>
          <li>反弹小球击碎所有砖块</li>
          <li>小球掉落到底部失去一条生命</li>
          <li>击碎所有砖块获胜</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 游戏中心. All rights reserved.</p>
    </div>
  </footer>

  <!-- 脚本 -->
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 游戏常量
    const CANVAS_WIDTH = 480;
    const CANVAS_HEIGHT = 400;
    const PADDLE_WIDTH = 80;
    const PADDLE_HEIGHT = 12;
    const BALL_RADIUS = 6;
    const BRICK_ROWS = 5;
    const BRICK_COLS = 8;
    const BRICK_WIDTH = 50;
    const BRICK_HEIGHT = 20;
    const BRICK_PADDING = 8;
    const BRICK_OFFSET_TOP = 50;
    const BRICK_OFFSET_LEFT = 20;
    
    // 游戏状态
    let paddle = { x: CANVAS_WIDTH / 2 - PADDLE_WIDTH / 2, y: CANVAS_HEIGHT - 30 };
    let ball = { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT - 50, dx: 3, dy: -3 };
    let bricks = [];
    let score = 0;
    let lives = 3;
    let isGameRunning = false;
    let isGameOver = false;
    let gameLoop = null;
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
      await syncCurrentUser();
      updateNav();
      if (typeof initMobileMenu === 'function') {
        initMobileMenu();
      }
      
      initBricks();
      draw();
      
      // 键盘控制
      canvas.addEventListener('keydown', handleKeyDown);
      canvas.focus();
      
      // 鼠标控制
      canvas.addEventListener('mousemove', handleMouseMove);
      
      // 点击开始
      canvas.addEventListener('click', startGame);
    });
    
    function initBricks() {
      bricks = [];
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
      
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
            y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            color: colors[r],
            visible: true
          });
        }
      }
    }
    
    function handleKeyDown(e) {
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        paddle.x = Math.max(0, paddle.x - 20);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        paddle.x = Math.min(CANVAS_WIDTH - PADDLE_WIDTH, paddle.x + 20);
      }
    }
    
    function handleMouseMove(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - PADDLE_WIDTH, mouseX - PADDLE_WIDTH / 2));
    }
    
    function startGame() {
      if (isGameRunning || isGameOver) return;
      isGameRunning = true;
      gameLoop = requestAnimationFrame(update);
    }
    
    function resetGame() {
      paddle = { x: CANVAS_WIDTH / 2 - PADDLE_WIDTH / 2, y: CANVAS_HEIGHT - 30 };
      ball = { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT - 50, dx: 3, dy: -3 };
      score = 0;
      lives = 3;
      isGameRunning = false;
      isGameOver = false;
      
      document.getElementById('score').textContent = '0';
      document.getElementById('lives').textContent = '3';
      document.getElementById('gameOverOverlay').classList.remove('active');
      
      if (gameLoop) {
        cancelAnimationFrame(gameLoop);
      }
      
      initBricks();
      draw();
    }
    
    function update() {
      if (!isGameRunning) return;
      
      // 移动小球
      ball.x += ball.dx;
      ball.y += ball.dy;
      
      // 墙壁碰撞
      if (ball.x - BALL_RADIUS < 0 || ball.x + BALL_RADIUS > CANVAS_WIDTH) {
        ball.dx = -ball.dx;
      }
      if (ball.y - BALL_RADIUS < 0) {
        ball.dy = -ball.dy;
      }
      
      // 挡板碰撞
      if (ball.y + BALL_RADIUS > paddle.y &&
          ball.y - BALL_RADIUS < paddle.y + PADDLE_HEIGHT &&
          ball.x > paddle.x &&
          ball.x < paddle.x + PADDLE_WIDTH) {
        ball.dy = -ball.dy;
        // 根据击中位置调整水平速度
        const hitPos = (ball.x - paddle.x) / PADDLE_WIDTH;
        ball.dx = 6 * (hitPos - 0.5);
      }
      
      // 砖块碰撞
      for (let brick of bricks) {
        if (brick.visible &&
            ball.x > brick.x &&
            ball.x < brick.x + brick.width &&
            ball.y - BALL_RADIUS < brick.y + brick.height &&
            ball.y + BALL_RADIUS > brick.y) {
          brick.visible = false;
          ball.dy = -ball.dy;
          score += 10;
          document.getElementById('score').textContent = score;
          break;
        }
      }
      
      // 掉落检测
      if (ball.y + BALL_RADIUS > CANVAS_HEIGHT) {
        lives--;
        document.getElementById('lives').textContent = lives;
        
        if (lives <= 0) {
          endGame();
          return;
        } else {
          // 重置小球位置
          ball.x = CANVAS_WIDTH / 2;
          ball.y = CANVAS_HEIGHT - 50;
          ball.dx = 3;
          ball.dy = -3;
          isGameRunning = false;
          draw();
          return;
        }
      }
      
      // 检查是否获胜
      const remainingBricks = bricks.filter(b => b.visible).length;
      if (remainingBricks === 0) {
        endGame(true);
        return;
      }
      
      draw();
      gameLoop = requestAnimationFrame(update);
    }
    
    function draw() {
      // 清空画布
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // 绘制砖块
      for (let brick of bricks) {
        if (brick.visible) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        }
      }
      
      // 绘制挡板
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(paddle.x, paddle.y, PADDLE_WIDTH, PADDLE_HEIGHT);
      ctx.strokeStyle = '#22c55e';
      ctx.strokeRect(paddle.x, paddle.y, PADDLE_WIDTH, PADDLE_HEIGHT);
      
      // 绘制小球
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#f59e0b';
      ctx.stroke();
      
      // 绘制提示
      if (!isGameRunning && !isGameOver) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.fillRect(0, CANVAS_HEIGHT / 2 - 30, CANVAS_WIDTH, 60);
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('点击或按空格键开始', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      }
    }
    
    async function endGame(win) {
      isGameRunning = false;
      isGameOver = true;
      cancelAnimationFrame(gameLoop);
      
      const title = win ? '🎉 恭喜获胜!' : '游戏结束';
      document.querySelector('.game-over-title').textContent = title;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverOverlay').classList.add('active');
      
      if (isLoggedIn()) {
        try {
          await gameAPI.submitScore('breakout', score);
          showNotification('分数已提交到排行榜！', 'success');
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }
    }
  </script>
</body>
</html>
