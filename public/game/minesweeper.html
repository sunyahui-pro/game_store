<!DOCTYPE html>
<html lang="zh-CN" data-color="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷 - 游戏中心</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .game-board {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      grid-template-rows: repeat(10, 30px);
      gap: 2px;
      margin: 0 auto;
      padding: 10px;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: fit-content;
    }
    
    .cell {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    
    .cell:hover:not(.revealed):not(.flagged) {
      background: linear-gradient(135deg, #7c8ce8 0%, #8a5cb8 100%);
      transform: scale(1.05);
    }
    
    .cell.revealed {
      background: #e0e0e0;
      cursor: default;
    }
    
    .cell.mine {
      background: #ff4444;
    }
    
    .cell.flagged::after {
      content: '🚩';
    }
    
    .cell.number-1 { color: #0000ff; }
    .cell.number-2 { color: #008000; }
    .cell.number-3 { color: #ff0000; }
    .cell.number-4 { color: #000080; }
    .cell.number-5 { color: #800000; }
    .cell.number-6 { color: #008080; }
    .cell.number-7 { color: #000000; }
    .cell.number-8 { color: #808080; }
    
    .game-info {
      display: flex;
      justify-content: center;
      gap: var(--space-6);
      margin-bottom: var(--space-4);
    }
    
    .info-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      text-align: center;
      min-width: 100px;
    }
    
    .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .game-over-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      z-index: 100;
    }
    
    .game-over-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .game-over-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: var(--space-4);
    }
    
    .game-over-score {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">游戏中心</span>
      </a>
      <nav class="nav-desktop" id="navLinksDesktop"></nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <nav id="navLinksMobile"></nav>
  </div>

  <main class="main">
    <div class="game-container">
      <div class="game-header">
        <h1 class="game-title"><span>💣</span><span>扫雷</span></h1>
        <div class="game-controls">
          <button class="btn btn-secondary" onclick="newGame()">🔄 新游戏</button>
          <a href="/games.html" class="btn btn-secondary">← 返回</a>
        </div>
      </div>
      
      <div class="game-info">
        <div class="info-box">
          <div class="info-label">剩余地雷</div>
          <div class="info-value" id="minesLeft">10</div>
        </div>
        <div class="info-box">
          <div class="info-label">时间</div>
          <div class="info-value" id="time">0:00</div>
        </div>
      </div>
      
      <div class="game-board" id="gameBoard"></div>
      
      <div class="game-instructions">
        <h3>🎮 游戏说明</h3>
        <ul>
          <li>左键点击翻开格子</li>
          <li>右键点击标记地雷</li>
          <li>数字表示周围8格的地雷数量</li>
          <li>找出所有非雷格子获胜</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 游戏中心. All rights reserved.</p>
    </div>
  </footer>

  <!-- 游戏结束弹窗 -->
  <div class="game-over-overlay" id="gameOverOverlay">
    <div class="game-over-title" id="gameOverTitle">游戏结束!</div>
    <div class="game-over-score">
      用时: <span id="finalTime">0:00</span>
    </div>
    <button class="btn btn-primary" onclick="newGame()">再玩一次</button>
  </div>

  <!-- 脚本 -->
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // 游戏常量
    const ROWS = 10;
    const COLS = 10;
    const MINES = 10;
    
    // 游戏状态
    let board = [];
    let revealed = [];
    let flagged = [];
    let gameOver = false;
    let gameStartTime = null;
    let timerInterval = null;
    let minesLeft = MINES;
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
      await syncCurrentUser();
      updateNav();
      if (typeof initMobileMenu === 'function') {
        initMobileMenu();
      }
      newGame();
    });
    
    function newGame() {
      board = [];
      revealed = [];
      flagged = [];
      gameOver = false;
      minesLeft = MINES;
      
      document.getElementById('minesLeft').textContent = minesLeft;
      document.getElementById('time').textContent = '0:00';
      document.getElementById('gameOverOverlay').classList.remove('active');
      
      if (timerInterval) {
        clearInterval(timerInterval);
      }
      
      // 初始化空板
      for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        revealed[r] = [];
        flagged[r] = [];
        for (let c = 0; c < COLS; c++) {
          board[r][c] = 0;
          revealed[r][c] = false;
          flagged[r][c] = false;
        }
      }
      
      // 放置地雷
      let minesPlaced = 0;
      while (minesPlaced < MINES) {
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (board[r][c] !== -1) {
          board[r][c] = -1;
          minesPlaced++;
        }
      }
      
      // 计算数字
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] !== -1) {
            board[r][c] = countMines(r, c);
          }
        }
      }
      
      renderBoard();
      
      gameStartTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);
    }
    
    function countMines(row, col) {
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const r = row + dr;
          const c = col + dc;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === -1) {
            count++;
          }
        }
      }
      return count;
    }
    
    function renderBoard() {
      const boardEl = document.getElementById('gameBoard');
      boardEl.innerHTML = '';
      
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          
          if (revealed[r][c]) {
            cell.classList.add('revealed');
            if (board[r][c] === -1) {
              cell.classList.add('mine');
              cell.textContent = '💣';
            } else if (board[r][c] > 0) {
              cell.classList.add(`number-${board[r][c]}`);
              cell.textContent = board[r][c];
            }
          } else if (flagged[r][c]) {
            cell.classList.add('flagged');
          }
          
          cell.addEventListener('click', () => revealCell(r, c));
          cell.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            toggleFlag(r, c);
          });
          
          boardEl.appendChild(cell);
        }
      }
    }
    
    function revealCell(row, col) {
      if (gameOver || revealed[row][col] || flagged[row][col]) return;
      
      revealed[row][col] = true;
      
      if (board[row][col] === -1) {
        endGame(false);
        return;
      }
      
      if (board[row][col] === 0) {
        revealEmpty(row, col);
      }
      
      renderBoard();
      checkWin();
    }
    
    function revealEmpty(row, col) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const r = row + dr;
          const c = col + dc;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && !revealed[r][c] && !flagged[r][c]) {
            revealed[r][c] = true;
            if (board[r][c] === 0) {
              revealEmpty(r, c);
            }
          }
        }
      }
    }
    
    function toggleFlag(row, col) {
      if (gameOver || revealed[row][col]) return;
      
      flagged[row][col] = !flagged[row][col];
      minesLeft += flagged[row][col] ? -1 : 1;
      document.getElementById('minesLeft').textContent = minesLeft;
      
      renderBoard();
    }
    
    function checkWin() {
      let revealedCount = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (revealed[r][c]) revealedCount++;
        }
      }
      
      if (revealedCount === ROWS * COLS - MINES) {
        endGame(true);
      }
    }
    
    function updateTimer() {
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    async function endGame(win) {
      gameOver = true;
      clearInterval(timerInterval);
      
      // 显示所有地雷
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] === -1) {
            revealed[r][c] = true;
          }
        }
      }
      renderBoard();
      
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      
      document.getElementById('gameOverTitle').textContent = win ? '🎉 恭喜获胜!' : '💥 游戏结束!';
      document.getElementById('finalTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      document.getElementById('gameOverOverlay').classList.add('active');
      
      if (win && isLoggedIn()) {
        const score = Math.max(1000 - elapsed * 2, 100);
        try {
          await gameAPI.submitScore('minesweeper', score);
          showNotification('分数已提交到排行榜！', 'success');
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }
    }
  </script>
</body>
</html>
