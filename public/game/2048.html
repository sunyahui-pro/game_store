<!DOCTYPE html>
<html lang="zh-CN" data-color="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - 游戏中心</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root {
      --grid-size: 4;
      --cell-size: 80px;
      --gap: 10px;
    }
    
    .game-2048 {
      --grid-size: 4;
      --cell-size: 80px;
      --gap: 10px;
    }
    
    .grid-container {
      background: #bbada0;
      border-radius: var(--radius-lg, 12px);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-template-rows: repeat(4, 80px);
      gap: 10px;
      margin: 0 auto;
    }
    
    .grid-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: var(--radius, 6px);
      width: 80px;
      height: 80px;
    }
    
    .tile {
      background: #eee4da;
      border-radius: var(--radius, 6px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #776e65;
      transition: all 0.15s ease;
      animation: appear 0.2s ease;
      width: 80px;
      height: 80px;
    }
    
    @keyframes appear {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.75rem; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.75rem; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.75rem; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; }
    
    .game-info {
      display: flex;
      justify-content: center;
      gap: var(--space-6);
      margin-bottom: var(--space-4);
    }
    
    .info-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3) var(--space-4);
      text-align: center;
      min-width: 100px;
    }
    
    .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .game-over-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .game-over-title {
      font-size: 3rem;
      font-weight: 700;
      color: #776e65;
      margin-bottom: var(--space-4);
    }
    
    .canvas-wrapper {
      position: relative;
      display: inline-block;
    }
    
    @media (max-width: 480px) {
      .game-2048 {
        --cell-size: 60px;
        --gap: 8px;
      }
      
      .tile {
        font-size: 1.5rem;
      }
      
      .tile-128, .tile-256, .tile-512 {
        font-size: 1.25rem;
      }
      
      .tile-1024, .tile-2048 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">游戏中心</span>
      </a>
      
      <nav class="nav-desktop" id="navLinksDesktop"></nav>
      
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <!-- 移动端菜单 -->
  <div class="mobile-menu" id="mobileMenu">
    <nav id="navLinksMobile"></nav>
  </div>

  <!-- 主内容 -->
  <main class="main">
    <div class="game-container">
      <div class="game-header">
        <h1 class="game-title">
          <span>🔢</span>
          <span>2048</span>
        </h1>
        <div class="game-controls">
          <button class="btn btn-secondary" onclick="newGame()">🔄 新游戏</button>
          <a href="/games.html" class="btn btn-secondary">← 返回</a>
        </div>
      </div>
      
      <div class="game-info">
        <div class="info-box">
          <div class="info-label">得分</div>
          <div class="info-value" id="score">0</div>
        </div>
        <div class="info-box">
          <div class="info-label">最高分</div>
          <div class="info-value" id="bestScore">0</div>
        </div>
      </div>
      
      <div class="game-canvas-container game-2048">
        <div class="canvas-wrapper">
          <div class="grid-container" id="gridContainer" tabindex="0" style="outline: none; cursor: pointer;"></div>
          <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">游戏结束!</div>
            <button class="btn btn-primary" onclick="newGame()">再试一次</button>
          </div>
        </div>
      </div>
      
      <div class="game-instructions">
        <h3>🎮 游戏说明</h3>
        <ul>
          <li>使用方向键 ↑↓←→ 或 WASD 移动方块</li>
          <li>相同数字的方块碰撞时会合并</li>
          <li>每次移动后会在空白处生成一个新方块（2或4）</li>
          <li>目标是合成 2048 方块！</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- 脚本 -->
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // 游戏状态
    let grid = [];
    let score = 0;
    let bestScore = 0;
    let gameOver = false;
    
    const GRID_SIZE = 4;
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        await syncCurrentUser();
        updateNav();
        if (typeof initMobileMenu === 'function') {
          initMobileMenu();
        }
      } catch (e) {
        console.error('初始化导航失败:', e);
      }
      
      // 初始化游戏
      newGame();
      
      // 键盘控制 - 绑定到游戏容器
      const gridContainer = document.getElementById('gridContainer');
      gridContainer.addEventListener('keydown', handleKeyDown);
      
      // 点击获得焦点
      gridContainer.addEventListener('click', function() {
        gridContainer.focus();
      });
      
      // 自动获得焦点
      gridContainer.focus();
      
      // 触摸控制
      if (typeof initTouchControls === 'function') {
        initTouchControls();
      }
    });
    
    // 初始化网格
    function initGrid() {
      grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
      score = 0;
      gameOver = false;
      updateScore();
      document.getElementById('gameOverOverlay').classList.remove('active');
    }
    
    // 新游戏
    function newGame() {
      initBackgroundCells();
      initGrid();
      addRandomTile();
      addRandomTile();
      renderGrid();
    }
    
    // 添加随机方块
    function addRandomTile() {
      const emptyCells = [];
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === 0) {
            emptyCells.push({r, c});
          }
        }
      }
      
      if (emptyCells.length > 0) {
        const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      }
    }
    
    // 初始化背景格子（只调用一次）
    let backgroundCellsInitialized = false;
    function initBackgroundCells() {
      if (backgroundCellsInitialized) return;
      
      const container = document.getElementById('gridContainer');
      container.innerHTML = '';
      
      // 添加16个背景格子
      for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        container.appendChild(cell);
      }
      
      backgroundCellsInitialized = true;
    }
    
    // 渲染网格（只更新数字方块）
    function renderGrid() {
      const container = document.getElementById('gridContainer');
      
      // 移除旧的数字方块（保留背景格子）
      const oldTiles = container.querySelectorAll('.tile');
      oldTiles.forEach(tile => tile.remove());
      
      // 添加新的数字方块
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] !== 0) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${grid[r][c]}`;
            tile.textContent = grid[r][c];
            tile.style.gridRow = r + 1;
            tile.style.gridColumn = c + 1;
            container.appendChild(tile);
          }
        }
      }
    }
    
    // 处理键盘输入
    function handleKeyDown(e) {
      if (gameOver) return;
      
      // 阻止方向键的默认行为（防止页面滚动）
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
      
      let moved = false;
      
      switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          moved = moveUp();
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          moved = moveDown();
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          moved = moveLeft();
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          moved = moveRight();
          break;
        default:
          return;
      }
      
      if (moved) {
        addRandomTile();
        renderGrid();
        updateScore();
        
        if (isGameOver()) {
          endGame();
        }
      }
    }
    
    // 移动逻辑
    function moveLeft() {
      let moved = false;
      for (let r = 0; r < GRID_SIZE; r++) {
        const row = grid[r].filter(v => v !== 0);
        for (let i = 0; i < row.length - 1; i++) {
          if (row[i] === row[i + 1]) {
            row[i] *= 2;
            score += row[i];
            row.splice(i + 1, 1);
          }
        }
        while (row.length < GRID_SIZE) row.push(0);
        
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] !== row[c]) moved = true;
          grid[r][c] = row[c];
        }
      }
      return moved;
    }
    
    function moveRight() {
      let moved = false;
      for (let r = 0; r < GRID_SIZE; r++) {
        const row = grid[r].filter(v => v !== 0);
        for (let i = row.length - 1; i > 0; i--) {
          if (row[i] === row[i - 1]) {
            row[i] *= 2;
            score += row[i];
            row.splice(i - 1, 1);
            i--;
          }
        }
        while (row.length < GRID_SIZE) row.unshift(0);
        
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] !== row[c]) moved = true;
          grid[r][c] = row[c];
        }
      }
      return moved;
    }
    
    function moveUp() {
      let moved = false;
      for (let c = 0; c < GRID_SIZE; c++) {
        const col = [];
        for (let r = 0; r < GRID_SIZE; r++) {
          if (grid[r][c] !== 0) col.push(grid[r][c]);
        }
        for (let i = 0; i < col.length - 1; i++) {
          if (col[i] === col[i + 1]) {
            col[i] *= 2;
            score += col[i];
            col.splice(i + 1, 1);
          }
        }
        while (col.length < GRID_SIZE) col.push(0);
        
        for (let r = 0; r < GRID_SIZE; r++) {
          if (grid[r][c] !== col[r]) moved = true;
          grid[r][c] = col[r];
        }
      }
      return moved;
    }
    
    function moveDown() {
      let moved = false;
      for (let c = 0; c < GRID_SIZE; c++) {
        const col = [];
        for (let r = 0; r < GRID_SIZE; r++) {
          if (grid[r][c] !== 0) col.push(grid[r][c]);
        }
        for (let i = col.length - 1; i > 0; i--) {
          if (col[i] === col[i - 1]) {
            col[i] *= 2;
            score += col[i];
            col.splice(i - 1, 1);
            i--;
          }
        }
        while (col.length < GRID_SIZE) col.unshift(0);
        
        for (let r = 0; r < GRID_SIZE; r++) {
          if (grid[r][c] !== col[r]) moved = true;
          grid[r][c] = col[r];
        }
      }
      return moved;
    }
    
    // 检查游戏结束
    function isGameOver() {
      // 检查是否有空格
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === 0) return false;
        }
      }
      
      // 检查是否可以合并
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (c < GRID_SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
          if (r < GRID_SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
        }
      }
      
      return true;
    }
    
    // 更新分数
    function updateScore() {
      document.getElementById('score').textContent = score;
      if (score > bestScore) {
        bestScore = score;
        document.getElementById('bestScore').textContent = bestScore;
      }
    }
    
    // 游戏结束
    async function endGame() {
      gameOver = true;
      document.getElementById('gameOverOverlay').classList.add('active');
      
      // 提交分数
      if (isLoggedIn()) {
        try {
          await gameAPI.submitScore('2048', score);
          showNotification('分数已提交到排行榜！', 'success');
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }
    }
    
    // 触摸控制
    function initTouchControls() {
      const container = document.getElementById('gridContainer');
      let startX, startY;
      
      container.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });
      
      container.addEventListener('touchend', (e) => {
        if (gameOver) return;
        
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        
        const dx = endX - startX;
        const dy = endY - startY;
        
        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > 30) {
            handleKeyDown({ key: 'ArrowRight', preventDefault: () => {} });
          } else if (dx < -30) {
            handleKeyDown({ key: 'ArrowLeft', preventDefault: () => {} });
          }
        } else {
          if (dy > 30) {
            handleKeyDown({ key: 'ArrowDown', preventDefault: () => {} });
          } else if (dy < -30) {
            handleKeyDown({ key: 'ArrowUp', preventDefault: () => {} });
          }
        }
      }, { passive: true });
    }
  </script>
</body>
</html>
