<!DOCTYPE html>
<html lang="zh-CN" data-color="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 - 游戏中心</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #gameCanvas {
      background: #1a1a2e;
      border-radius: var(--radius);
    }
    
    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    
    .game-over-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .game-over-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: var(--space-4);
    }
    
    .canvas-wrapper {
      position: relative;
      display: inline-block;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">游戏中心</span>
      </a>
      <nav class="nav-desktop" id="navLinksDesktop"></nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <nav id="navLinksMobile"></nav>
  </div>

  <main class="main">
    <div class="game-container">
      <div class="game-header">
        <h1 class="game-title"><span>🐍</span><span>贪吃蛇</span></h1>
        <div class="game-controls">
          <button class="btn btn-secondary" onclick="newGame()">🔄 新游戏</button>
          <button class="btn btn-secondary" onclick="togglePause()" id="pauseBtn">⏸️ 暂停</button>
          <a href="/games.html" class="btn btn-secondary">← 返回</a>
        </div>
      </div>
      
      <div class="game-info">
        <div class="info-box">
          <div class="info-label">得分</div>
          <div class="info-value" id="score">0</div>
        </div>
        <div class="info-box">
          <div class="info-label">长度</div>
          <div class="info-value" id="length">3</div>
        </div>
      </div>
      
      <div class="game-canvas-container">
        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="400" height="400"></canvas>
          <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">游戏结束!</div>
            <div style="color: white; margin-bottom: 1rem;">最终得分: <span id="finalScore">0</span></div>
            <button class="btn btn-primary" onclick="newGame()">再试一次</button>
          </div>
        </div>
      </div>
      
      <div class="game-instructions">
        <h3>🎮 游戏说明</h3>
        <ul>
          <li>使用方向键 ↑↓←→ 控制蛇的移动</li>
          <li>吃掉红色食物来增长和得分</li>
          <li>撞到墙壁或自己的身体游戏结束</li>
          <li>按空格键暂停/继续游戏</li>
        </ul>
      </div>
    </div>
  </main>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 20;
    const TILE_COUNT = 20;
    
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameLoop = null;
    let isPaused = false;
    let gameOver = false;
    
    document.addEventListener('DOMContentLoaded', async function() {
      await syncCurrentUser();
      updateNav();
      initMobileMenu();
      newGame();
      document.addEventListener('keydown', handleKeyDown);
    });
    
    function newGame() {
      snake = [{x: 10, y: 10}];
      food = randomPosition();
      dx = 0;
      dy = 0;
      score = 0;
      isPaused = false;
      gameOver = false;
      updateScore();
      document.getElementById('gameOverOverlay').classList.remove('active');
      document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
      
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 100);
      draw();
    }
    
    function randomPosition() {
      return {
        x: Math.floor(Math.random() * TILE_COUNT),
        y: Math.floor(Math.random() * TILE_COUNT)
      };
    }
    
    function update() {
      if (isPaused || gameOver) return;
      
      // 还没开始移动（玩家没按方向键）
      if (dx === 0 && dy === 0) return;
      
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      // 撞墙检测
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        endGame();
        return;
      }
      
      // 撞自己检测（跳过第一节，因为那是新头部位置）
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          endGame();
          return;
        }
      }
      
      snake.unshift(head);
      
      // 吃食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        food = randomPosition();
        // 确保食物不在蛇身上
        while (snake.some(s => s.x === food.x && s.y === food.y)) {
          food = randomPosition();
        }
      } else {
        snake.pop();
      }
      
      draw();
    }
    
    function draw() {
      // 清空画布
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 画蛇
      snake.forEach((segment, i) => {
        ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
        ctx.fillRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
      });
      
      // 画食物
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function handleKeyDown(e) {
      if (gameOver) return;
      
      switch(e.key) {
        case 'ArrowUp':
          if (dy === 0) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (dy === 0) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (dx === 0) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (dx === 0) { dx = 1; dy = 0; }
          break;
        case ' ':
          e.preventDefault();
          togglePause();
          return;
        default:
          return;
      }
      e.preventDefault();
    }
    
    function togglePause() {
      if (gameOver) return;
      isPaused = !isPaused;
      document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
    }
    
    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('length').textContent = snake.length;
    }
    
    async function endGame() {
      gameOver = true;
      clearInterval(gameLoop);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverOverlay').classList.add('active');
      
      if (isLoggedIn()) {
        try {
          await gameAPI.submitScore('snake', score);
          showNotification('分数已提交到排行榜！', 'success');
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }
    }
  </script>
</body>
</html>
